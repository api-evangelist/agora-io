name: Agora
description: Agora is a real-time engagement platform providing ultra-low latency voice, video, signaling, chat,
  interactive whiteboard, cloud recording, real-time speech-to-text, and conversational AI infrastructure for
  human-to-human and human-to-AI interactions. The platform powers approximately 80 billion communication minutes
  monthly across 3+ billion devices, serving 1,800+ organizations including Whatnot, The Sandbox, Education First,
  Talkspace, HTC Vive, and Unity Technologies.
image: https://www.agora.io/favicon.ico
