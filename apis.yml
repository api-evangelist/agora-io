  - type: Features
    data:
      - name: Ultra-Low Latency
        description: Sub-200ms global latency for responsive real-time voice, video, and signaling on a software-defined
          real-time network spanning 200+ data centers across 200+ countries.
      - name: 99.999% Uptime SLA
        description: Five-nines uptime guarantee with 24/7 monitoring and incident response across the global Agora SD-RTN
          network.
      - name: AI Noise Suppression
        description: Deep-learning audio enhancement that isolates human speech and removes background noise, keyboard
          clicks, and ambient interference.
      - name: 3D Spatial Audio
        description: Positional audio rendering that places voices in 3D space for immersive social, gaming, and virtual
          world experiences.
      - name: Live Avatar Synthesis
        description: Real-time avatar animation synchronized to speech audio, enabling generative video personas for AI
          agents and human speakers.
      - name: Real-Time Transcription and Translation
        description: Streaming speech-to-text and live cross-language translation delivered into RTC channels as captions.
      - name: Cross-Platform SDKs
        description: First-party SDKs for iOS, Android, Web, Windows, macOS, Linux, Unity, Unreal Engine, Flutter, React
          Native, Electron, and embedded devices.
      - name: Enterprise Compliance
        description: SOC 2 Type II, GDPR, HIPAA, and regional residency support for regulated workloads.
      - name: No-Code App Builder and UI Kits
        description: Drop-in UI Kit and visual App Builder that let teams launch RTE experiences without writing
          custom signaling or media plumbing.
  - type: UseCases
    data:
      - name: Telehealth and Remote Care
        description: HIPAA-aligned video visits, secure messaging, and AI-assisted clinical workflows between
          patients and providers.
      - name: Live Shopping and Commerce
        description: Interactive live streams with co-host promotion, shoppable overlays, and real-time engagement for
          marketplaces like Whatnot.
      - name: Online Education and EdTech
        description: Virtual classrooms, breakout rooms, shared whiteboards, and recorded lessons used by Education First
          and global learning platforms.
      - name: Real-Time Gaming and Virtual Worlds
        description: Proximity voice, team chat, and 3D spatial audio for multiplayer games, metaverse platforms like
          The Sandbox, and VR experiences on HTC Vive.
      - name: Media, Entertainment, and Social Audio
        description: Drop-in audio rooms, fan engagement broadcasts, watch parties, and creator livestreams.
      - name: Customer Support and Contact Center
        description: Voice, video, and chat support channels with recording, transcription, and AI agent escalation.
      - name: Conversational AI Voice Agents
        description: LLM-powered phone and in-app voice agents with sub-second latency, used for sales, support, and
          companion applications.
      - name: IoT and Embedded Communications
        description: Low-bandwidth, low-power voice and video for doorbells, intercoms, robotics, and connected devices.
  - type: Integrations
    data:
      - name: OpenAI Realtime API
        description: Reference integration combining Agora's RTC layer with OpenAI's Realtime API for voice agents,
          published as openai-realtime-python.
      - name: Anthropic Claude
        description: Conversational AI Engine integration with Claude models for natural-language voice agents and
          enterprise assistants.
      - name: AWS, Azure, Google Cloud Storage
        description: Cloud Recording targets for video, audio, and composite session archives across major cloud
          storage providers.
      - name: Alibaba OSS, Qiniu, Tencent COS
        description: Additional regional cloud storage targets for recording and content delivery in APAC.
      - name: WordPress
        description: Official Agora Video for WordPress plugin for embedding live broadcast and video conferencing in
          posts and pages.
      - name: Salesforce, HubSpot, Zendesk
        description: CRM and helpdesk integrations for contact center and customer engagement workflows.
      - name: WeChat Mini Programs
        description: Embedded Agora SDKs that run inside WeChat Mini Program runtimes for China-market deployments.
      - name: Unity and Unreal Engine
        description: Native engine plugins for in-game voice, video, and signaling.
  - type: Solutions
    data:
      - name: Real-Time Engagement Platform
        description: Unified voice, video, signaling, chat, recording, and analytics for any human-to-human
          interactive experience.
      - name: Conversational AI Platform
        description: End-to-end stack for building voice AI agents with avatar, ASR, LLM, TTS, and noise suppression
          provided as a managed pipeline.
      - name: Live Streaming and Broadcast
        description: One-to-many and interactive many-to-many live streaming with CDN egress and recording.
      - name: Embedded and IoT RTE
        description: Optimized SDKs for low-resource devices and embedded systems.
