  - name: Agora Broadcast Streaming API
    description: The Agora Broadcast Streaming API supports one-way large-scale content distribution with optimized
      bandwidth for audience-only scenarios such as town halls, concerts, sports broadcasts, and one-to-many media
      experiences.
