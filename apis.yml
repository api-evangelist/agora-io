  - name: Agora Signaling API (RTM)
    description: The Agora Signaling API (formerly Real-Time Messaging / RTM) provides real-time low-latency
      synchronization of metadata, presence, channel events, point-to-point messages, and stream-of-state payloads.
      Designed to complement RTC channels with structured signaling and state distribution at scale.
    image: https://www.agora.io/favicon.ico
    humanURL: https://docs.agora.io/en/signaling/overview/product-overview
