      - type: Quickstart
        url: https://docs.agora.io/en/voice-calling/get-started/get-started-sdk
    contact:
      - FN: Agora Support
        email: support@agora.io
  - name: Agora Interactive Live Streaming API
    description: The Agora Interactive Live Streaming API powers ultra-low latency live streaming with interactive
      multi-host capabilities for audiences of any size. Supports live shopping, social audio, virtual events,
      esports, and broadcast experiences where viewers can be promoted to co-hosts in real time.
    image: https://www.agora.io/favicon.ico
    humanURL: https://docs.agora.io/en/interactive-live-streaming/overview/product-overview
    baseURL: https://api.agora.io
    tags:
