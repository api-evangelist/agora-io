apis:
  - name: Agora Video Calling API
    description: The Agora Video Calling API enables real-time, interactive video communication with sub-200ms global
      latency. Supports one-to-one calls, group calls, and multi-host scenarios across mobile, web, desktop, and
      embedded platforms. Includes AI noise suppression, super resolution, virtual backgrounds, and 3D spatial audio.
    image: https://www.agora.io/favicon.ico
    humanURL: https://docs.agora.io/en/video-calling/overview/product-overview
    baseURL: https://api.agora.io
    tags:
      - Video
      - Real-Time Communication
      - WebRTC
      - Calling
    properties:
      - type: Documentation
        url: https://docs.agora.io/en/video-calling/overview/product-overview
      - type: APIReference
        url: https://docs.agora.io/en/video-calling/reference/api-reference
      - type: Quickstart
        url: https://docs.agora.io/en/video-calling/get-started/get-started-sdk
      - type: Authentication
        url: https://docs.agora.io/en/video-calling/get-started/authentication-workflow
    contact:
      - FN: Agora Support
        email: support@agora.io
  - name: Agora Voice Calling API
    description: The Agora Voice Calling API embeds high-quality real-time voice chat into any application. Provides
      crystal-clear audio with AI noise suppression, echo cancellation, and adaptive bitrate, supporting voice-only
      experiences for social, gaming, customer support, and IoT use cases.
    image: https://www.agora.io/favicon.ico
    humanURL: https://docs.agora.io/en/voice-calling/overview/product-overview
    baseURL: https://api.agora.io
    tags:
